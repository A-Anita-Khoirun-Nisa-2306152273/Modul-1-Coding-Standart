<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Order History</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h3>Search Order History</h3>

  <form th:action="@{/order/history}" method="post">
    <div class="form-group">
      <label>Author</label>
      <input type="text" name="author" class="form-control mb-3 col-4" placeholder="Enter author name" required>
    </div>

    <button type="submit" class="btn btn-primary">Search</button>
    <a th:href="@{/order/create}" class="btn btn-secondary">Create Order</a>
  </form>
</div>
</body>
</html>
