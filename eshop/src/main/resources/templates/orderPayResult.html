<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Payment Result</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h3>Payment Result</h3>

  <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>
  <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
  <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>

  <a th:href="@{/payment/detail/{id}(id=${payment.id})}" class="btn btn-primary">View Detail</a>
  <a th:href="@{/payment/admin/list}" class="btn btn-secondary">Admin List</a>
</div>
</body>
</html>
