<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Payment Admin List</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h3>Payment Admin List</h3>

  <table class="table table-bordered">
    <thead>
    <tr>
      <th>Payment ID</th>
      <th>Method</th>
      <th>Status</th>
      <th>Order ID</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="payment : ${payments}">
      <td th:text="${payment.id}"></td>
      <td th:text="${payment.method}"></td>
      <td th:text="${payment.status}"></td>
      <td th:text="${payment.order.id}"></td>
      <td>
        <a th:href="@{/payment/admin/detail/{id}(id=${payment.id})}" class="btn btn-sm btn-primary">
          Detail
        </a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
