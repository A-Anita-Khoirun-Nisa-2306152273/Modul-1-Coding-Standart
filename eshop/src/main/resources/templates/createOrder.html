<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>Create Order</h3>

    <form th:action="@{/order/create}" method="post">
        <div class="form-group">
            <label>Author</label>
            <input type="text" name="author" class="form-control mb-3 col-4" placeholder="Enter author name" required>
        </div>

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="productName" class="form-control mb-3 col-4" placeholder="Enter product name" required>
        </div>

        <div class="form-group">
            <label>Product Quantity</label>
            <input type="number" name="productQuantity" class="form-control mb-3 col-4" placeholder="Enter quantity" required>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
        <a th:href="@{/order/history}" class="btn btn-secondary">Check History</a>
    </form>
</div>
</body>
</html>
