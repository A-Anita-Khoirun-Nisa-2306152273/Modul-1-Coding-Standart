<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Payment Admin Detail</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h3>Payment Admin Detail</h3>

  <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>
  <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
  <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>
  <p><strong>Order ID:</strong> <span th:text="${payment.order.id}"></span></p>

  <form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
    <div class="form-group">
      <label>Set Status</label>
      <select name="status" class="form-control mb-3 col-4">
        <option value="SUCCESS">SUCCESS</option>
        <option value="REJECTED">REJECTED</option>
      </select>
    </div>
    <button type="submit" class="btn btn-success">Update Status</button>
  </form>

  <a th:href="@{/payment/admin/list}" class="btn btn-secondary mt-3">Back to List</a>
</div>
</body>
</html>
